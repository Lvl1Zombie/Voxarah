<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Voxarah Hex Shield — flat-top hexagon, double-headed arrow, 4 dots -->

  <!-- Outer flat-top hexagon (r=28, cx=32, cy=32) -->
  <!-- Points at 0°,60°,120°,180°,240°,300° -->
  <polygon
    points="60,32 46,56.22 18,56.22 4,32 18,7.78 46,7.78"
    fill="none" stroke="#F5C518" stroke-width="2.5"/>

  <!-- Inner flat-top hexagon (r=20) -->
  <polygon
    points="52,32 42,49.32 22,49.32 12,32 22,14.68 42,14.68"
    fill="none" stroke="#F5C518" stroke-width="1.2" opacity="0.45"/>

  <!-- Arrow shaft -->
  <line x1="32" y1="20" x2="32" y2="44" stroke="#F5C518" stroke-width="1.5"/>

  <!-- Top arrowhead -->
  <polygon points="32,8 24,20 40,20" fill="#F5C518"/>

  <!-- Bottom arrowhead -->
  <polygon points="32,56 24,44 40,44" fill="#F5C518"/>

  <!-- Four dots -->
  <circle cx="8"  cy="26" r="3" fill="#F5C518"/>
  <circle cx="56" cy="26" r="3" fill="#F5C518"/>
  <circle cx="8"  cy="38" r="3" fill="#F5C518"/>
  <circle cx="56" cy="38" r="3" fill="#F5C518"/>
</svg>
